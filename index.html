<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My C-Pop Library</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; line-height: 1.6; max-width: 600px; margin: 40px auto; padding: 20px; background-color: #f8f9fa; }
        h1 { color: #2c3e50; text-align: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; margin-bottom: 20px; }
        .info-box { display: none; border-top: 2px solid #eee; pt: 20px; margin-top: 20px; }
        .label { font-weight: bold; color: #7f8c8d; font-size: 0.9em; margin-top: 10px; }
        .value { font-size: 1.1em; margin-bottom: 10px; color: #34495e; }
        .lyrics { background: #f1f2f6; padding: 15px; border-radius: 8px; white-space: pre-wrap; font-size: 0.95em; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎵 C-Pop Finder</h1>
    <p style="text-align:center; color:#666;">노래를 선택하면 정보를 확인합니다.</p>
    
    <select id="songSelect" onchange="showDetails()">
        <option value="">노래를 로딩 중이거나 선택해주세요...</option>
    </select>

    <div id="infoBox" class="info-box">
        <div class="label">가수</div>
        <div id="singer" class="value"></div>
        
        <div class="label">특징 (키 조절)</div>
        <div id="keyInfo" class="value"></div>
        
        <div style="display: flex; gap: 20px;">
            <div>
                <div class="label">대만 KTV</div>
                <div id="twKtv" class="value" style="color:#e67e22; font-weight:bold;"></div>
            </div>
            <div>
                <div class="label">한국 TJ</div>
                <div id="krTj" class="value" style="color:#3498db; font-weight:bold;"></div>
            </div>
        </div>

        <div class="label">가사</div>
        <div id="lyrics" class="lyrics"></div>
    </div>
</div>

<script>
    // ⚠️ 여기에 구글 시트에서 복사한 CSV URL을 넣으세요.
    const publicSheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTzYXUKvax6iY1hbvc0QtJkQscpcIHITiGsGION3HxSzbV3W60yM8_O3GhT3cqWckceVrG-jp-Iky8v/pub?output=csv'; 
    let songData = [];

    // 데이터 불러오기
    Papa.parse(publicSheetUrl, {
        download: true,
        header: true,
        complete: function(results) {
            songData = results.data;
            const select = document.getElementById('songSelect');
            select.innerHTML = '<option value="">노래 선택</option>';
            
            songData.forEach((song, index) => {
                if(song.중국어노래제목) {
                    const opt = document.createElement('option');
                    opt.value = index;
                    opt.innerHTML = `${song.중국어노래제목} - ${song.가수}`;
                    select.appendChild(opt);
                }
            });
        }
    });

    // 선택 시 내용 표시
    function showDetails() {
        const idx = document.getElementById('songSelect').value;
        const box = document.getElementById('infoBox');
        
        if (idx === "") {
            box.style.display = 'none';
            return;
        }

        const song = songData[idx];
        document.getElementById('singer').innerText = song.가수;
        document.getElementById('keyInfo').innerText = song.키조절 || '정보 없음';
        document.getElementById('twKtv').innerText = song.대만ktv || '-';
        document.getElementById('krTj').innerText = song.한국tj || '-';
        document.getElementById('lyrics').innerText = song.가사;
        
        box.style.display = 'block';
    }
</script>

</body>
</html>
