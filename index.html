<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Multi-Language Library</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; line-height: 1.6; max-width: 600px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; text-align: center; font-size: 1.5rem; margin-bottom: 20px; }
        
        /* 탭 버튼 스타일 */
        .tab-container { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; background: #e0e0e0; color: #666; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #3498db; color: white; }
        
        select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #e0e0e0; font-size: 16px; outline: none; transition: border 0.3s; }
        select:focus { border-color: #3498db; }
        
        .info-box { display: none; margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; }
        .grid { display: flex; justify-content: space-between; margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .label { font-weight: bold; color: #7f8c8d; font-size: 0.85em; margin-bottom: 4px; }
        .value { font-size: 1.05em; color: #2c3e50; }
        .lyrics-container { margin-top: 20px; }
        .lyrics { background: #34495e; color: #ecf0f1; padding: 20px; border-radius: 10px; white-space: pre-wrap; font-size: 0.95em; line-height: 1.8; max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="mainTitle">🎵 나의 노래 보관함</h1>

    <div class="tab-container">
        <button class="tab-btn active" onclick="changeSheet('sheet1', this)">중국어</button>
        <button class="tab-btn" onclick="changeSheet('sheet2', this)">번안곡</button>
        <button class="tab-btn" onclick="changeSheet('sheet3', this)">일본어</button>
    </div>
    
    <select id="songSelect" onchange="showDetails()">
        <option value="">데이터를 불러오는 중...</option>
    </select>

    <div id="infoBox" class="info-box">
        <div class="grid">
            <div>
                <div class="label">가수</div>
                <div id="singer" class="value"></div>
            </div>
            <div style="text-align: right;">
                <div class="label">키 조절</div>
                <div id="keyInfo" class="value"></div>
            </div>
        </div>

        <div class="grid" style="background: #ebf5fb;">
            <div>
                <div class="label">번호 1 (해외)</div>
                <div id="twKtv" class="value" style="color: #e67e22; font-weight: bold;"></div>
            </div>
            <div style="text-align: right;">
                <div class="label">한국 TJ 번호</div>
                <div id="krTj" class="value" style="color: #3498db; font-weight: bold;"></div>
            </div>
        </div>

        <div class="lyrics-container">
            <div class="label">가사</div>
            <div id="lyrics" class="lyrics"></div>
        </div>
    </div>
</div>

<script>
    // 💡 각 시트의 CSV URL을 여기에 넣으세요 (gid 번호가 각각 달라야 합니다)
    const urls = {
        sheet1: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTzYXUKvax6iY1hbvc0QtJkQscpcIHITiGsGION3HxSzbV3W60yM8_O3GhT3cqWckceVrG-jp-Iky8v/pub?gid=0&single=true&output=csv',
        sheet2: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTzYXUKvax6iY1hbvc0QtJkQscpcIHITiGsGION3HxSzbV3W60yM8_O3GhT3cqWckceVrG-jp-Iky8v/pub?gid=1228089290&single=true&output=csv',
        sheet3: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTzYXUKvax6iY1hbvc0QtJkQscpcIHITiGsGION3HxSzbV3W60yM8_O3GhT3cqWckceVrG-jp-Iky8v/pub?gid=641214884&single=true&output=csv'
    };

    // 💡 시트의 컬럼명 (모든 시트가 동일한 컬럼명을 사용한다고 가정합니다)
    const COL_TITLE = "노래 제목"; // 시트 1행의 제목 컬럼명 확인 필수
    const COL_SINGER = "가수";
    const COL_KEY = "키조절";
    const COL_TW = "해외번호"; // 대만KTV 등
    const COL_KR = "한국tj";
    const COL_LYRICS = "가사";

    let songData = [];

    // 데이터를 가져오는 메인 함수
    function loadData(url) {
        const select = document.getElementById('songSelect');
        const box = document.getElementById('infoBox');
        
        box.style.display = 'none'; // 상세정보 초기화
        select.innerHTML = '<option value="">데이터를 불러오는 중...</option>';

        Papa.parse(url, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                songData = results.data;
                select.innerHTML = '<option value="">노래를 선택하세요 (총 ' + songData.length + '곡)</option>';
                
                songData.forEach((song, index) => {
                    if(song[COL_TITLE]) {
                        const opt = document.createElement('option');
                        opt.value = index;
                        opt.innerHTML = song[COL_TITLE] + " - " + (song[COL_SINGER] || "알 수 없음");
                        select.appendChild(opt);
                    }
                });
            },
            error: function() {
                alert("데이터 로드 실패! URL 또는 시트 설정을 확인하세요.");
            }
        });
    }

    // 탭 클릭 시 시트 변경
    function changeSheet(sheetKey, btn) {
        // 버튼 활성화 스타일 변경
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // 데이터 로드
        loadData(urls[sheetKey]);
    }

    function showDetails() {
        const idx = document.getElementById('songSelect').value;
        const box = document.getElementById('infoBox');
        
        if (idx === "") {
            box.style.display = 'none';
            return;
        }

        const song = songData[idx];
        document.getElementById('singer').innerText = song[COL_SINGER] || '-';
        document.getElementById('keyInfo').innerText = song[COL_KEY] || '기본키';
        document.getElementById('twKtv').innerText = song[COL_TW] || '없음';
        document.getElementById('krTj').innerText = song[COL_KR] || '없음';
        document.getElementById('lyrics').innerText = song[COL_LYRICS] || '등록된 가사가 없습니다.';
        
        box.style.display = 'block';
    }

    // 초기 실행 (첫 번째 시트 로드)
    // 실제 사용 시 urls.sheet1 자리에 링크가 있어야 작동합니다.
    if(urls.sheet1 !== '여기에_중국어_시트_CSV_URL') {
        loadData(urls.sheet1);
    }
</script>

</body>
</html>
